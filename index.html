<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Block Puzzle - 方块拼图 工具</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <div style="position: relative;width: 100vw; height: 100vh;">
        <div id="bottom_layer">
            <table cellpadding="0" cellspacing="2" border="0">
                <tbody>
                    <tr>
                        <td>
                            <table cellpadding="0" cellspacing="2" width="100%" border="0">
                                <tbody>
                                    <tr>
                                        <td align="left" width="50%">
                                            <p id="score">得分: 0</p>
                                        </td>
                                        <td align="right">
                                            <span id="times">可使用次数：0</span>
                                            <button type="button" id="addTimes" class="disable-dbl-tap-zoom"
                                                style="font-size:18px">+</button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <div style="position: relative;">
                                <canvas id="canvasOutput" class="disable-dbl-tap-zoom" width="886" height="886"
                                    style="width: 633px; height: 633px;"></canvas>
                                <canvas id="canvasSelector" class="disable-dbl-tap-zoom"
                                    style="position: absolute; width: 633px; height: 633px; display: block; left: 653px; top: 0px; z-index: 50;"
                                    width="886" height="886"></canvas>
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <div style="display: flex; align-items: center; gap: 20px;">
                                <canvas id="canvasRound" class="disable-dbl-tap-zoom" width="886" height="195"
                                    style="width: 633px; height: 140px;"></canvas>
                                <div
                                    style="flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 140px;">
                                    <p id="status" style="text-align: center; margin: 0 0 15px 0;">抱歉，可用次数用完</p>
                                    <div style="display: flex; justify-content: center; gap: 8px; flex-wrap: wrap;">
                                        <button type="button" id="InputButton" class="disable-dbl-tap-zoom"
                                            style="font-size:18px" disabled="">选好啦!</button>
                                        <button type="button" class="btn btn-primary btn-sm disable-dbl-tap-zoom"
                                            style="font-size:18px" id="step" disabled="">
                                            ▶ 下一步
                                        </button>
                                        <button type="button" class="btn btn-warning btn-sm disable-dbl-tap-zoom"
                                            style="font-size:18px" id="edit" disabled="">
                                            设置盘面
                                        </button>
                                        <button type="button" class="btn btn-warning btn-sm disable-dbl-tap-zoom"
                                            style="font-size:18px" id="reset" disabled="">
                                            保存
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div id="selector_layer">
        </div>

    </div>

    <script src="./js/lib/piggyAlert.js" type="text/javascript"></script>
    <script src="./js/lib/vendor.js" type="text/javascript"></script>
    <script src="./js/tracker.js" type="text/javascript"></script>

    <script src="./js/canvas.js" type="text/javascript"></script>
    <script src="./js/config.js" type="text/javascript"></script>
    <script src="./js/utils.js" type="text/javascript"></script>
    <script src="./js/core/algorithm.js" type="text/javascript"></script>
    <script src="./js/components/board.js" type="text/javascript"></script>
    <script src="./js/components/shapeSelector.js" type="text/javascript"></script>

    <script src="./js/ui.js" type="text/javascript"></script>

</body>

</html>
