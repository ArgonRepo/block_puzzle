<!DOCTYPE html>
<html><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Block Puzzle - 方块拼图 工具</title>
    <link rel="stylesheet" href="./css/font-awesome.css">
    <style>
        .board {
            width: 480px;
            position: relative;
        }

        .top-align {
            vertical-align: top;
        }

        .draggable {
            width: 120px;
            height: 120px;
            position: absolute;
            cursor: move;
        }

        .disable-dbl-tap-zoom {
            touch-action: manipulation;
        }
    </style>
<style type="text/css">  
    .piggy_modal {  
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        overflow: auto;
        background-color: rgba(0, 0, 0, 0.5);
        align-items: center;
        justify-content: center;
    }  

    .piggy_modal-content {
        background: white;
        border-radius: 8px;
        box-shadow: 0px 0px 10px 0px rgba(0, 0, 0, 0.2);
        max-width: 500px;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        padding: 20px;
    }  
    .piggy_close {  
        position: absolute;
        right: 10px;
        top: 10px;
        font-size: 20px;
        font-weight: bold;
        cursor: pointer;
        color: #888888;
        transition: color 0.3s ease;
    }
    .piggy_close:hover {
        color: #000000;
    }
    </style></head>
<body>
    <div style="position: relative;width: 100vw; height: 100vh;">
        <div id="bottom_layer">
            <table cellpadding="0" cellspacing="2" border="0">
                <tbody>
                    <tr>
                        <td>
                            <table cellpadding="0" cellspacing="2" width="100%" border="0">
                                <tbody>
                                    <tr>
                                        <td align="left" width="50%">
                                            <p id="score">得分: 0</p>
                                        </td>
                                        <td align="right">
                                            <span id="times">可使用次数：0</span>
                                            <button type="button" id="addTimes" class="disable-dbl-tap-zoom" style="font-size:18px">+</button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <div style="position: relative;">
                                <canvas id="canvasOutput" class="disable-dbl-tap-zoom" width="886" height="886" style="width: 633px; height: 633px;"></canvas>
                                <canvas id="canvasSelector" class="disable-dbl-tap-zoom" style="position: absolute; width: 633px; height: 633px; display: block; left: 653px; top: 0px; z-index: 50;" width="886" height="886"></canvas>
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <canvas id="canvasRound" class="disable-dbl-tap-zoom" width="886" height="195" style="width: 633px; height: 140px;"></canvas>
                        </td>
                    </tr>
                    <tr>
                        <td align="center">
                            <p id="status">抱歉，可用次数用完</p>
                        </td>
                    </tr>
                    <tr>
                        <td align="center">
                            <button type="button" id="InputButton" class="disable-dbl-tap-zoom" style="font-size:18px" disabled="">选好啦!</button>
                            <button type="button" class="btn btn-primary btn-sm disable-dbl-tap-zoom" style="font-size:18px" id="step" disabled="">
                                <i class="fa fa-caret-right"></i> 下一步
                            </button>
                            <button type="button" class="btn btn-warning btn-sm disable-dbl-tap-zoom" style="font-size:18px" id="edit" disabled="">
                                设置盘面
                            </button>
                            <button type="button" class="btn btn-warning btn-sm disable-dbl-tap-zoom" style="font-size:18px" id="reset" disabled="">
                                保存
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div id="selector_layer">
        </div>
        <div id="mask_layer" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000;">
            <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; border-radius: 8px; padding: 20px;">
              	<span>功能未实现</span>
                <button type="button" id="submitCoupon" style="display: none;">提交</button>
            </div>
        </div>
    </div>

    <script src="./js/lib/piggyAlert.js" type="text/javascript"></script>  
    <div id="customAlert" class="piggy_modal">
        <div class="piggy_modal-content">
            <span class="piggy_close">×</span>
            <p id="alertMessage"></p>
        </div>
    </div>  
    
    <script src="./js/lib/piggy.min.js" type="text/javascript"></script>
    <script src="./js/canvas.js" type="text/javascript"></script>
    <script src="./js/board.min.js" type="text/javascript"></script>
    <script src="./js/ui.js" type="text/javascript"></script>

</body></html>
